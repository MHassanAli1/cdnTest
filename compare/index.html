<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#050506" />
  <title>A/B · CDN Reel Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://vz-41999221-afc.b-cdn.net" crossorigin />
  <link rel="preconnect" href="https://stream.mux.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body data-cdn="bunny">
  <div class="vs">
    <section class="side" data-side="a">
      <video></video>
      <div class="s-card" hidden></div>
      <div class="spinner"></div>
      <div class="s-meta">
        <button type="button" class="s-cdn">BUNNY ▾</button>
        <span class="s-name">Bunny.net</span>
        <span class="s-startup">…</span>
        <span class="s-sub">loading</span>
      </div>
    </section>

    <div class="vs-bar">
      <div class="verdict" id="verdict"></div>
      <div class="vs-controls">
        <div class="reeldots" id="reeldots"></div>
        <button type="button" class="rerun" id="rerun" aria-label="run test again">
          <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          RUN
        </button>
      </div>
    </div>

    <section class="side" data-side="b">
      <video></video>
      <div class="s-card" hidden></div>
      <div class="spinner"></div>
      <div class="s-meta">
        <button type="button" class="s-cdn">MUX ▾</button>
        <span class="s-name">Mux</span>
        <span class="s-startup">…</span>
        <span class="s-sub">loading</span>
      </div>
    </section>
  </div>

  <a class="back" href="../">
    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> Lab
  </a>

  <script type="module" src="../compare.js"></script>
</body>
</html>
